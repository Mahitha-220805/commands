<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses — Wallet</title>
  <link rel="stylesheet" href="styles.css">
  <script src="auth.js"></script>
  <style>
    .expense-list-card { max-width: 560px; margin: 0 auto; }
    .expense-list-card h1 { margin-bottom: 0.25rem; }
    .expense-list-card .subtitle { color: var(--text-secondary); font-size: 0.9375rem; margin-bottom: 1.25rem; }
    .expense-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem; }
    .expense-actions a { color: var(--accent-deep); font-weight: 600; text-decoration: none; font-size: 0.9375rem; }
    .expense-actions a:hover { text-decoration: underline; }
    .btn-add { display: inline-block; padding: 0.5rem 1rem; background: linear-gradient(145deg, var(--accent), var(--accent-deep)); color: #fff; border-radius: 12px; font-size: 0.875rem; font-weight: 600; text-decoration: none; }
    .btn-add:hover { opacity: 0.95; }
    .expense-list { list-style: none; }
    .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 0.75rem; background: var(--bg-input); flex-wrap: wrap; gap: 0.5rem; }
    .expense-item-content { flex: 1; min-width: 0; }
    .expense-item-amount { font-weight: 700; font-size: 1.125rem; color: var(--accent-deep); }
    .expense-item-meta { font-size: 0.8125rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .expense-item-actions { display: flex; gap: 0.5rem; }
    .btn-edit, .btn-delete { padding: 0.4rem 0.75rem; border-radius: 8px; font-size: 0.8125rem; font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
    .btn-edit { background: rgba(232, 160, 176, 0.25); color: var(--accent-deep); }
    .btn-edit:hover { background: rgba(232, 160, 176, 0.4); }
    .btn-delete { background: rgba(199, 92, 111, 0.15); color: var(--error); }
    .btn-delete:hover { background: rgba(199, 92, 111, 0.25); }
    .expense-empty, .expense-loading, .expense-error { text-align: center; color: var(--text-secondary); padding: 2rem; }
    .expense-error { color: var(--error); }
    .expense-empty a { color: var(--accent-deep); font-weight: 600; text-decoration: none; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 10; padding: 1rem; }
    .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; width: 100%; max-width: 400px; }
    .modal h3 { margin-bottom: 1rem; font-size: 1.125rem; }
    .modal .form-group { margin-bottom: 1rem; }
    .modal .form-group select, .modal .form-group input { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-input); color: var(--text-primary); font-size: 1rem; }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .modal-actions button { flex: 1; padding: 0.75rem; border-radius: 10px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .modal-cancel { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); }
    .modal-save { background: linear-gradient(145deg, var(--accent), var(--accent-deep)); color: #fff; border: none; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <a href="login.html" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back
      </a>

      <div class="logo">
        <div class="logo-icon">W</div>
        <span class="logo-text">Wallet</span>
      </div>

      <div class="auth-card expense-list-card">
        <div class="expense-actions">
          <a href="addExpense.html">Add expense</a>
          <a href="addExpense.html" class="btn-add">+ Add</a>
        </div>
        <h1>Expense list</h1>
        <p class="subtitle">View, edit or delete your expenses</p>

        <div id="expense-loading" class="expense-loading">Loading…</div>
        <div id="expense-error" class="expense-error" style="display: none;"></div>
        <div id="expense-empty" class="expense-empty" style="display: none;">
          No expenses yet. <a href="addExpense.html">Add your first expense</a>
        </div>
        <ul id="expense-list" class="expense-list" style="display: none;"></ul>
      </div>
    </div>
  </div>

  <div id="edit-modal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <h3>Edit expense</h3>
      <form id="edit-form">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label for="edit-amount">Amount</label>
          <input type="number" id="edit-amount" min="0" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="edit-category">Category</label>
          <select id="edit-category">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="edit-description">Description</label>
          <input type="text" id="edit-description" placeholder="Optional">
        </div>
        <div class="form-group">
          <label for="edit-date">Date</label>
          <input type="date" id="edit-date" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-cancel" id="edit-cancel">Cancel</button>
          <button type="submit" class="modal-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function () {
      if (!isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      const loadingEl = document.getElementById('expense-loading');
      const errorEl = document.getElementById('expense-error');
      const emptyEl = document.getElementById('expense-empty');
      const listEl = document.getElementById('expense-list');
      const modalEl = document.getElementById('edit-modal');
      const editForm = document.getElementById('edit-form');

      function formatDate(str) {
        if (!str) return '—';
        const d = new Date(str);
        return isNaN(d) ? str : d.toLocaleDateString();
      }

      function formatAmount(n) {
        return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function renderList(expenses) {
        listEl.innerHTML = '';
        expenses.forEach(function (e) {
          const li = document.createElement('li');
          li.className = 'expense-item';
          li.innerHTML =
            '<div class="expense-item-content">' +
              '<span class="expense-item-amount">$' + formatAmount(e.amount) + '</span>' +
              '<div class="expense-item-meta">' + (e.category || 'Other') + (e.description ? ' · ' + e.description : '') + ' · ' + formatDate(e.date) + '</div>' +
            '</div>' +
            '<div class="expense-item-actions">' +
              '<button type="button" class="btn-edit" data-id="' + e.id + '">Edit</button>' +
              '<button type="button" class="btn-delete" data-id="' + e.id + '">Delete</button>' +
            '</div>';
          listEl.appendChild(li);
        });

        listEl.querySelectorAll('.btn-edit').forEach(function (btn) {
          btn.addEventListener('click', function () {
            const id = this.getAttribute('data-id');
            const expense = expenses.find(function (x) { return x.id === id; });
            if (!expense) return;
            document.getElementById('edit-id').value = expense.id;
            document.getElementById('edit-amount').value = expense.amount;
            document.getElementById('edit-category').value = expense.category || 'Other';
            document.getElementById('edit-description').value = expense.description || '';
            document.getElementById('edit-date').value = expense.date || '';
            modalEl.style.display = 'flex';
          });
        });

        listEl.querySelectorAll('.btn-delete').forEach(function (btn) {
          btn.addEventListener('click', function () {
            const id = this.getAttribute('data-id');
            if (!confirm('Delete this expense?')) return;
            apiRequest('/expense/delete', { method: 'DELETE', body: JSON.stringify({ id: id }) })
              .then(loadList)
              .catch(function (err) { alert(err.error || 'Delete failed.'); });
          });
        });
      }

      function loadList() {
        loadingEl.style.display = 'block';
        errorEl.style.display = 'none';
        emptyEl.style.display = 'none';
        listEl.style.display = 'none';

        apiRequest('/expense/list')
          .then(function (data) {
            loadingEl.style.display = 'none';
            if (!data.expenses || data.expenses.length === 0) {
              emptyEl.style.display = 'block';
              return;
            }
            listEl.style.display = 'block';
            renderList(data.expenses);
          })
          .catch(function (err) {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.textContent = err.error || 'Could not load expenses.';
            if (err.status === 401 || err.status === 403) {
              clearToken();
              setTimeout(function () { window.location.href = 'login.html'; }, 1500);
            }
          });
      }

      editForm.addEventListener('submit', function (e) {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const payload = {
          id: id,
          amount: Number(document.getElementById('edit-amount').value),
          category: document.getElementById('edit-category').value,
          description: document.getElementById('edit-description').value.trim(),
          date: document.getElementById('edit-date').value,
        };
        apiRequest('/expense/update', { method: 'PUT', body: JSON.stringify(payload) })
          .then(function () {
            modalEl.style.display = 'none';
            loadList();
          })
          .catch(function (err) { alert(err.error || 'Update failed.'); });
      });

      document.getElementById('edit-cancel').addEventListener('click', function () {
        modalEl.style.display = 'none';
      });

      loadList();
    })();
  </script>
</body>
</html>
